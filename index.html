<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Automobile</title>
    <style>
        :root {
            --primary-color: #00d4ff;   /* Bleu électrique pour le style auto */
            --accent-color: #ffcc00;    /* Jaune sport */
            --success-color: #06d6a0;   
            --danger-color: #ef476f;    
            --panel-bg: #1a1a2e;        
            --text-dark: #f8f9fa;       
            --option-bg: #16213e;       
            --option-border: #0f3460;   
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
            position: relative;
        }

        .top-controls { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; }

        .control-btn { background-color: var(--panel-bg); color: var(--primary-color); border: 2px solid var(--primary-color); padding: 10px 15px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: all 0.3s ease; }
        .control-btn:hover { background-color: var(--primary-color); color: white; }

        .quiz-container { background-color: var(--panel-bg); border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); padding: 35px; width: 100%; max-width: 600px; text-align: center; border-top: 6px solid var(--primary-color); margin-top: 50px; }

        h1 { color: var(--accent-color); margin-bottom: 25px; font-size: 28px; }
        .btn { background-color: var(--primary-color); color: #000; border: none; padding: 14px 25px; font-size: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; transition: all 0.2s ease; margin: 10px; width: 85%; }
        .btn:hover { filter: brightness(1.2); }
        .btn-danger { background-color: var(--danger-color); color: white; }
        .option-btn { background-color: var(--option-bg); color: var(--text-dark); border: 2px solid var(--option-border); }
        .option-btn:hover { background-color: var(--option-border); border-color: var(--primary-color); }
        
        .screen { display: none; }
        .active { display: block; }
        .correct-ans { color: var(--success-color); font-weight: bold; }
        .wrong-ans { color: var(--danger-color); font-weight: bold; }
        .correction-item { background: var(--option-bg); padding: 15px; margin-bottom: 12px; border-radius: 10px; border-inline-start: 5px solid; text-align: start; }
    </style>
</head>
<body>

    <div class="top-controls">
        <button class="control-btn" id="lang-btn" onclick="toggleLang()">🌍 العربية</button>
        <button class="control-btn" id="audio-btn" onclick="toggleMusic()">🎵 Son : OFF</button>
    </div>

    <div class="quiz-container">
        <div id="menu-screen" class="screen active">
            <h1 id="menu-title">🏎️ Quiz Automobile 🏎️</h1>
            <div id="categories-menu"></div>
        </div>
        <div id="quiz-screen" class="screen">
            <h2 id="quiz-title">Domaine</h2>
            <div id="question-text" style="font-size: 20px; margin-bottom: 20px;"></div>
            <div id="options-menu"></div>
            <div id="immediate-feedback" style="display: none; margin-top: 20px;">
                <p id="feedback-message"></p>
                <button class="btn" onclick="passerQuestionSuivante()">➡️ Continuer</button>
            </div>
        </div>
        <div id="result-screen" class="screen">
            <h1>Résultat</h1>
            <div id="final-score" style="font-size: 24px; margin: 20px 0;"></div>
            <div id="corrections-zone"></div>
            <button class="btn" onclick="retourAuMenu()">🔄 Menu</button>
        </div>
    </div>

    <script>
        const locales = {
            fr: {
                categories: {
                    "Marques et Modèles 🚘": [
                        { question: "Quelle marque italienne a pour logo un taureau ?", options: ["Ferrari", "Lamborghini", "Maserati", "Alfa Romeo"], reponse: 1 },
                        { question: "Quel modèle est le plus vendu de l'histoire de Volkswagen ?", options: ["Golf", "Polo", "Coccinelle", "Passat"], reponse: 0 },
                        { question: "Quel constructeur produit la célèbre Mustang ?", options: ["Chevrolet", "Dodge", "Ford", "Pontiac"], reponse: 2 },
                        { question: "De quel pays est originaire la marque Volvo ?", options: ["Suède", "Norvège", "Danemark", "Allemagne"], reponse: 0 },
                        { question: "Quel est le logo de la marque Audi ?", options: ["Une étoile", "Quatre anneaux", "Un lion", "Un cheval"], reponse: 1 },
                        { question: "Quelle voiture est le symbole du luxe britannique avec sa calandre massive ?", options: ["Jaguar", "Bentley", "Rolls-Royce", "Aston Martin"], reponse: 2 },
                        { question: "Quel modèle de Porsche est le plus iconique ?", options: ["Cayenne", "911", "Panamera", "Macan"], reponse: 1 },
                        { question: "Quelle marque japonaise est réputée pour sa fiabilité et ses hybrides ?", options: ["Honda", "Toyota", "Nissan", "Mazda"], reponse: 1 },
                        { question: "Quel est le nom de la voiture électrique phare de Tesla ?", options: ["Model S", "Model 3", "Cybertruck", "Roadster"], reponse: 1 },
                        { question: "Quelle marque française utilise le logo du Lion ?", options: ["Renault", "Citroën", "Peugeot", "Bugatti"], reponse: 2 }
                    ],
                    "Mécanique et F1 🏁": [
                        { question: "Que signifie le sigle ABS ?", options: ["Anti-Block System", "Anti-Brake System", "Auto Brake Speed", "Air Brake System"], reponse: 0 },
                        { question: "Quel est le recordman de titres mondiaux en Formule 1 (à égalité) ?", options: ["Ayrton Senna", "Michael Schumacher", "Lewis Hamilton", "Max Verstappen"], reponse: 1 },
                        { question: "À quoi sert un turbo dans un moteur ?", options: ["Refroidir l'eau", "Augmenter la puissance", "Réduire le poids", "Nettoyer l'huile"], reponse: 1 },
                        { question: "Quelle écurie est surnommée 'La Scuderia' ?", options: ["McLaren", "Mercedes", "Ferrari", "Red Bull"], reponse: 2 },
                        { question: "Quelle est la fonction d'une boîte de vitesse ?", options: ["Changer de couleur", "Transmettre le couple", "Freiner", "Diriger"], reponse: 1 },
                        { question: "Quelle couleur de drapeau signifie l'arrêt de la course en F1 ?", options: ["Jaune", "Noir", "Rouge", "Blanc"], reponse: 2 },
                        { question: "Comment appelle-t-on le liquide qui permet au moteur de ne pas surchauffer ?", options: ["Huile", "Essence", "Liquide de refroidissement", "Liquide de frein"], reponse: 2 },
                        { question: "Qu'est-ce qu'un moteur V8 ?", options: ["8 cylindres en V", "8 pistons", "8 soupapes", "8 litres"], reponse: 0 },
                        { question: "Quelle partie de la voiture est en contact avec la route ?", options: ["La suspension", "Le pneu", "La jante", "Le châssis"], reponse: 1 },
                        { question: "Quel est le nom du circuit le plus célèbre de Monaco ?", options: ["Spa", "Monaco GP", "Suzuka", "Interlagos"], reponse: 1 }
                    ]
                }
            },
            ar: {
                categories: {
                    "ماركات السيارات 🚘": [
                        { question: "ما هي الماركة الإيطالية التي يمثل شعارها ثوراً هائجاً؟", options: ["فيراري", "لامبورغيني", "مازيراتي", "ألفا روميو"], reponse: 1 },
                        { question: "ما هو الطراز الأكثر مبيعاً في تاريخ فولكس فاجن؟", options: ["جولف", "بولو", "بيتل (الخنفساء)", "باسات"], reponse: 0 },
                        { question: "أي شركة تصنع السيارة الشهيرة موستانج؟", options: ["شفروليه", "دودج", "فورد", "بونتياك"], reponse: 2 },
                        { question: "من أي دولة تنحدر ماركة فولفو؟", options: ["السويد", "النرويج", "الدنمارك", "ألمانيا"], reponse: 0 },
                        { question: "ما هو شعار شركة أودي؟", options: ["نجمة", "أربع حلقات", "أسد", "حصان"], reponse: 1 },
                        { question: "ما هي السيارة التي تعتبر رمزاً للفخامة البريطانية؟", options: ["جاكوار", "بنتلي", "رولز رويس", "أستون مارتن"], reponse: 2 },
                        { question: "ما هو الطراز الأكثر شهرة لشركة بورش؟", options: ["كايين", "911", "باناميرا", "ماكان"], reponse: 1 },
                        { question: "ما هي الماركة اليابانية المشهورة بموثوقيتها وسياراتها الهجينة؟", options: ["هوندا", "تويوتا", "نيسان", "مازدا"], reponse: 1 },
                        { question: "ما هو اسم سيارة تسلا الكهربائية الأكثر مبيعاً؟", options: ["موديل S", "موديل 3", "سايبر تراك", "رودستر"], reponse: 1 },
                        { question: "ما هي الماركة الفرنسية التي تستخدم الأسد كشعار؟", options: ["رينو", "سيتروين", "بيجو", "بوغاتي"], reponse: 2 }
                    ],
                    "ميكانيكا وفورمولا 1 🏁": [
                        { question: "ماذا يعني اختصار ABS في السيارات؟", options: ["نظام منع انغلاق المكابح", "نظام تسريع المكابح", "نظام التبريد", "نظام الهواء"], reponse: 0 },
                        { question: "من يملك الرقم القياسي لأكبر عدد من ألقاب بطولة العالم للفورمولا 1؟", options: ["أيرتون سينا", "مايكل شوماخر", "لويس هاميلتون", "ماكس فيرستابن"], reponse: 1 },
                        { question: "ما هي وظيفة 'التيربو' في المحرك؟", options: ["تبريد الماء", "زيادة القوة", "تقليل الوزن", "تنظيف الزيت"], reponse: 1 },
                        { question: "ما هو الفريق الملقب بـ 'سكوديريا'؟", options: ["ماكلارين", "مرسيدس", "فيراري", "ريد بول"], reponse: 2 },
                        { question: "ما هي وظيفة علبة السرعة (القير)؟", options: ["تغيير اللون", "نقل القوة والعزم", "الفرملة", "التوجيه"], reponse: 1 },
                        { question: "ماذا يعني العلم الأحمر في سباقات الفورمولا 1؟", options: ["تحذير", "نهاية السباق", "إيقاف السباق", "دخول الأمان"], reponse: 2 },
                        { question: "ما هو السائل الذي يمنع ارتفاع حرارة المحرك؟", options: ["زيت", "بنزين", "سائل التبريد", "سائل الفرامل"], reponse: 2 },
                        { question: "ماذا يعني محرك V8؟", options: ["8 أسطوانات على شكل حرف V", "8 مكابس", "8 صمامات", "8 لترات"], reponse: 0 },
                        { question: "أي جزء من السيارة هو الوحيد الملامس للطريق؟", options: ["نظام التعليق", "الإطار (الكفر)", "الجنط", "الهيكل"], reponse: 1 },
                        { question: "ما هو اسم حلبة السباق الأكثر شهرة في موناكو؟", options: ["سبا", "موناكو GP", "سوزوكا", "إنترلاغوس"], reponse: 1 }
                    ]
                }
            }
        };

        // Logique JS identique à la précédente...
        let currentLang = 'fr', currentThemeKey = "", indexQuestionActuelle = 0, score = 0, reponsesUtilisateur = [];
        
        function toggleLang() { currentLang = currentLang === 'fr' ? 'ar' : 'fr'; document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr'; genererMenu(); }
        function toggleMusic() { let b = document.getElementById('audio-btn'); b.innerText = b.innerText.includes('OFF') ? '🎵 Son : ON' : '🎵 Son : OFF'; }
        
        function genererMenu() {
            let m = document.getElementById('categories-menu'); m.innerHTML = "";
            Object.keys(locales[currentLang].categories).forEach((c, i) => {
                let btn = document.createElement('button'); btn.className = 'btn'; btn.innerText = c;
                btn.onclick = () => lancerQuiz(c); m.appendChild(btn);
            });
            document.getElementById('menu-screen').className = 'screen active';
            document.getElementById('quiz-screen').className = 'screen';
            document.getElementById('result-screen').className = 'screen';
        }

        function lancerQuiz(key) { currentThemeKey = key; indexQuestionActuelle = 0; score = 0; reponsesUtilisateur = []; afficherQuestion(); }

        function afficherQuestion() {
            let q = locales[currentLang].categories[currentThemeKey][indexQuestionActuelle];
            document.getElementById('menu-screen').className = 'screen';
            document.getElementById('quiz-screen').className = 'screen active';
            document.getElementById('quiz-title').innerText = currentThemeKey;
            document.getElementById('question-text').innerText = q.question;
            let opt = document.getElementById('options-menu'); opt.innerHTML = ""; document.getElementById('immediate-feedback').style.display = 'none';
            q.options.forEach((o, i) => {
                let b = document.createElement('button'); b.className = 'btn option-btn'; b.innerText = o;
                b.onclick = () => {
                    reponsesUtilisateur.push(i);
                    if(i === q.reponse) score++;
                    document.getElementById('feedback-message').innerHTML = i === q.reponse ? '<span class="correct-ans">✅ Correct !</span>' : '<span class="wrong-ans">❌ Faux ! La réponse était '+q.options[q.reponse]+'</span>';
                    document.getElementById('immediate-feedback').style.display = 'block';
                };
                opt.appendChild(b);
            });
        }

        function passerQuestionSuivante() {
            indexQuestionActuelle++;
            if(indexQuestionActuelle < 10) afficherQuestion();
            else afficherResultats();
        }

        function afficherResultats() {
            document.getElementById('quiz-screen').className = 'screen';
            document.getElementById('result-screen').className = 'screen active';
            document.getElementById('final-score').innerText = "Score: " + score + "/10";
        }

        function retourAuMenu() { genererMenu(); }
        genererMenu();
    </script>
</body>
</html>
