<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Automobile</title>
    <style>
        :root {
            --primary-color: #9d4edd;
            --accent-color: #ff9e00;
            --success-color: #06d6a0;
            --danger-color: #ef476f;
            --panel-bg: #10002b;
            --text-dark: #f8f9fa;
            --option-bg: #240046;
            --option-border: #3c096c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #10002b 0%, #3c096c 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
            position: relative;
        }

        .top-controls { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; }
        .control-btn { background-color: var(--panel-bg); color: var(--primary-color); border: 2px solid var(--primary-color); padding: 10px 15px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: all 0.3s ease; }
        .control-btn:hover { background-color: var(--primary-color); color: white; }

        .quiz-container { background-color: var(--panel-bg); border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); padding: 35px; width: 100%; max-width: 600px; text-align: center; border-top: 6px solid var(--primary-color); margin-top: 50px; }
        h1 { color: var(--accent-color); margin-bottom: 25px; font-size: 28px; }
        .btn { background-color: var(--primary-color); color: white; border: none; padding: 14px 25px; font-size: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; transition: all 0.2s ease; margin: 10px; width: 85%; }
        .btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-danger { background-color: var(--danger-color); }
        .option-btn { background-color: var(--option-bg); border: 2px solid var(--option-border); }
        .option-btn:hover { background-color: var(--option-border); border-color: var(--primary-color); }
        
        .screen { display: none; }
        .active { display: block; }
        .progress { font-size: 14px; color: #adb5bd; margin-bottom: 15px; }
        .score-text { font-size: 32px; font-weight: bold; margin: 15px 0; color: var(--accent-color); }
        .correction-item { background: var(--option-bg); padding: 15px; margin-bottom: 12px; border-radius: 10px; border: 1px solid var(--option-border); border-inline-start: 5px solid; text-align: start; }
        .correct-ans { color: var(--success-color); font-weight: 600; }
        .wrong-ans { color: var(--danger-color); font-weight: 600; }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mp3">
    </audio>

    <div class="top-controls">
        <button class="control-btn" id="lang-btn" onclick="toggleLang()">🌍 العربية</button>
        <button class="control-btn" id="audio-btn" onclick="toggleMusic()">🎵 Musique : OFF</button>
    </div>

    <div class="quiz-container">
        <div id="menu-screen" class="screen active">
            <h1 id="menu-title">🏎️ Quiz Automobile 🏎️</h1>
            <div id="categories-menu" style="margin-top: 25px;"></div>
        </div>

        <div id="quiz-screen" class="screen">
            <h2 id="quiz-title">Domaine</h2>
            <div class="progress" id="progress-text"></div>
            <h3 id="question-text"></h3>
            <div id="options-menu"></div>
            <div id="immediate-feedback" style="display:none; margin-top:20px;">
                <p id="feedback-message" style="font-size: 22px; font-weight: bold;"></p>
                <p id="feedback-detail"></p>
                <button class="btn btn-danger" onclick="retourAuMenu()">🏠 Quitter</button>
                <button class="btn" onclick="passerQuestionSuivante()">➡️ Continuer</button>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <h1 id="result-title">Fin !</h1>
            <div class="score-text" id="final-score"></div>
            <div id="corrections-zone" class="corrections-container" style="max-height: 300px; overflow-y: auto;"></div>
            <button class="btn" onclick="retourAuMenu()">🔄 Rejouer</button>
        </div>
    </div>

    <script>
        const locales = {
            fr: {
                categories: {
                    "Marques Européennes 🇪🇺": [
                        { question: "Quel est le logo de la marque italienne Ferrari ?", options: ["Un taureau", "Un cheval cabré", "Un lion", "Un trident"], reponse: 1 },
                        { question: "De quel pays est originaire la marque Volkswagen ?", options: ["France", "Italie", "Allemagne", "Japon"], reponse: 2 },
                        { question: "Quelle marque est célèbre pour ses modèles '911' ?", options: ["Porsche", "BMW", "Audi", "Mercedes"], reponse: 0 },
                        { question: "Laquelle de ces marques est française ?", options: ["Fiat", "Renault", "Skoda", "Volvo"], reponse: 1 },
                        { question: "Quel est le pays d'origine de Volvo ?", options: ["Suède", "Norvège", "Danemark", "Finlande"], reponse: 0 }
                    ],
                    "Marques de Luxe & Supercars 🏎️": [
                        { question: "Quelle marque fabrique la célèbre Chiron ?", options: ["Lamborghini", "Bugatti", "Pagani", "Koenigsegg"], reponse: 1 },
                        { question: "Quel est le symbole de Lamborghini ?", options: ["Un lion", "Un aigle", "Un taureau", "Un cheval"], reponse: 2 },
                        { question: "D'où vient la marque Rolls-Royce ?", options: ["États-Unis", "Royaume-Uni", "Allemagne", "Italie"], reponse: 1 },
                        { question: "Quelle marque utilise le logo au trident ?", options: ["Maserati", "Ferrari", "Alfa Romeo", "Aston Martin"], reponse: 0 },
                        { question: "Quel modèle de chez Aston Martin est associé à James Bond ?", options: ["DBS", "DB5", "Vantage", "Valhalla"], reponse: 1 }
                    ]
                }
            },
            ar: {
                categories: {
                    "ماركات أوروبية 🇪🇺": [
                        { question: "ما هو شعار شركة فيراري الإيطالية؟", options: ["ثور", "حصان جامح", "أسد", "رمح ثلاثي"], reponse: 1 },
                        { question: "من أي بلد أصل شركة فولكس فاجن؟", options: ["فرنسا", "إيطاليا", "ألمانيا", "اليابان"], reponse: 2 },
                        { question: "أي ماركة تشتهر بطرازات '911'؟", options: ["بورش", "بي إم دبليو", "أودي", "مرسيدس"], reponse: 0 },
                        { question: "أي من هذه الماركات فرنسية؟", options: ["فيات", "رينو", "سكودا", "فولفو"], reponse: 1 },
                        { question: "ما هو بلد منشأ شركة فولفو؟", options: ["السويد", "النرويج", "الدنمارك", "فنلندا"], reponse: 0 }
                    ],
                    "ماركات فاخرة ورياضية 🏎️": [
                        { question: "أي شركة تصنع طراز شيرون الشهير؟", options: ["لامبورغيني", "بوغاتي", "باغاني", "كوينيجسيج"], reponse: 1 },
                        { question: "ما هو شعار شركة لامبورغيني؟", options: ["أسد", "نسر", "ثور", "حصان"], reponse: 2 },
                        { question: "من أين تأتي ماركة رولز رويس؟", options: ["الولايات المتحدة", "المملكة المتحدة", "ألمانيا", "إيطاليا"], reponse: 1 },
                        { question: "أي ماركة تستخدم شعار الرمح الثلاثي؟", options: ["مازيراتي", "فيراري", "ألفا روميو", "أستون مارتن"], reponse: 0 },
                        { question: "أي طراز من أستون مارتن يرتبط بجيمس بوند؟", options: ["DBS", "DB5", "Vantage", "Valhalla"], reponse: 1 }
                    ]
                }
            }
        };

        // ... (Logique JS identique pour assurer la fluidité du quiz)
        let currentLang = 'fr', currentThemeKey = "", indexQuestionActuelle = 0, score = 0, reponsesUtilisateur = [];
        
        function toggleLang() { currentLang = currentLang === 'fr' ? 'ar' : 'fr'; genererMenu(); }
        function toggleMusic() { const m = document.getElementById('bg-music'); m.paused ? m.play() : m.pause(); }
        
        function genererMenu() {
            document.getElementById('menu-screen').classList.add('active');
            document.getElementById('quiz-screen').classList.remove('active');
            document.getElementById('result-screen').classList.remove('active');
            const menu = document.getElementById('categories-menu'); menu.innerHTML = "";
            Object.keys(locales[currentLang].categories).forEach((cat, i) => {
                const b = document.createElement('button'); b.className = 'btn'; b.innerText = cat;
                b.onclick = () => lancerQuiz(cat); menu.appendChild(b);
            });
        }

        function lancerQuiz(cat) {
            currentThemeKey = cat; indexQuestionActuelle = 0; score = 0; reponsesUtilisateur = [];
            document.getElementById('menu-screen').classList.remove('active');
            document.getElementById('quiz-screen').classList.add('active');
            afficherQuestion();
        }

        function afficherQuestion() {
            const q = locales[currentLang].categories[currentThemeKey][indexQuestionActuelle];
            document.getElementById('quiz-title').innerText = currentThemeKey;
            document.getElementById('question-text').innerText = q.question;
            const options = document.getElementById('options-menu'); options.innerHTML = "";
            q.options.forEach((opt, i) => {
                const b = document.createElement('button'); b.className = 'btn option-btn'; b.innerText = opt;
                b.onclick = () => {
                    reponsesUtilisateur.push(i);
                    if(i === q.reponse) score++;
                    document.getElementById('immediate-feedback').style.display = 'block';
                    document.getElementById('feedback-message').innerText = i === q.reponse ? "✅ Correct" : "❌ Faux";
                };
                options.appendChild(b);
            });
            document.getElementById('immediate-feedback').style.display = 'none';
        }

        function passerQuestionSuivante() {
            indexQuestionActuelle++;
            if(indexQuestionActuelle < locales[currentLang].categories[currentThemeKey].length) afficherQuestion();
            else afficherResultats();
        }

        function afficherResultats() {
            document.getElementById('quiz-screen').classList.remove('active');
            document.getElementById('result-screen').classList.add('active');
            document.getElementById('final-score').innerText = `Score: ${score} / 5`;
        }
        
        function retourAuMenu() { genererMenu(); }
        genererMenu();
    </script>
</body>
</html>
