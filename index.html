<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de Quiz Interactif</title>
    <style>
        /* NOUVEAU THÈME : DARK MODE / NÉON VIOLET */
        :root {
            --primary-color: #9d4edd;   /* Violet lumineux */
            --accent-color: #ff9e00;    /* Orange néon */
            --success-color: #06d6a0;   /* Vert menthe */
            --danger-color: #ef476f;    /* Rose/Rouge vif */
            --panel-bg: #10002b;        /* Bleu-violet très sombre */
            --text-dark: #f8f9fa;       /* Blanc cassé pour le texte */
            --option-bg: #240046;       /* Fond des boutons d'options */
            --option-border: #3c096c;   /* Bordure des boutons */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #10002b 0%, #3c096c 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
            position: relative;
        }

        /* Contrôles Top (Langue & Audio) */
        .top-controls {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
        }

        .control-btn {
            background-color: var(--panel-bg);
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 10px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(157, 78, 221, 0.2);
            font-family: inherit;
        }

        .control-btn:hover {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 6px 20px rgba(157, 78, 221, 0.5);
        }

        .quiz-container {
            background-color: var(--panel-bg);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            padding: 35px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            border-top: 6px solid var(--primary-color);
            margin-top: 50px;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 25px;
            font-size: 28px;
            text-shadow: 0 2px 10px rgba(255, 158, 0, 0.3);
        }

        h2, h3 { color: var(--text-dark); }

        .screen { display: none; }
        .active { display: block; }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 10px;
            width: 85%;
            box-shadow: 0 4px 10px rgba(157, 78, 221, 0.3);
            font-family: inherit;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(157, 78, 221, 0.5);
            filter: brightness(1.1);
        }

        /* Bouton rouge pour quitter */
        .btn-danger {
            background-color: var(--danger-color);
            box-shadow: 0 4px 10px rgba(239, 71, 111, 0.3);
        }
        .btn-danger:hover {
            box-shadow: 0 6px 15px rgba(239, 71, 111, 0.5);
        }

        .option-btn {
            background-color: var(--option-bg);
            color: var(--text-dark);
            border: 2px solid var(--option-border);
            box-shadow: none;
        }

        .option-btn:hover {
            background-color: var(--option-border);
            border-color: var(--primary-color);
            color: white;
            transform: none;
        }

        .progress {
            font-size: 14px;
            color: #adb5bd;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .score-text {
            font-size: 32px;
            font-weight: bold;
            margin: 15px 0;
            color: var(--accent-color);
            text-shadow: 0 2px 10px rgba(255, 158, 0, 0.3);
        }

        /* Correction immédiate */
        #immediate-feedback {
            background-color: var(--option-bg);
            border: 1px solid var(--option-border);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .action-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 20px;
        }

        .action-buttons .btn {
            margin: 0;
            width: 100%;
        }

        /* Correction de fin */
        .corrections-container {
            max-height: 350px;
            overflow-y: auto;
            margin: 25px 0;
            padding: 0 10px;
            text-align: start;
        }
        
        .corrections-container::-webkit-scrollbar { width: 8px; }
        .corrections-container::-webkit-scrollbar-track { background: var(--option-bg); border-radius: 4px; }
        .corrections-container::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 4px; }

        .correction-item {
            background: var(--option-bg);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid var(--option-border);
            border-inline-start: 5px solid;
        }
        .correction-item p { margin: 6px 0; }
        .question-title { font-weight: bold; color: var(--accent-color); }
        .correct-ans { color: var(--success-color); font-weight: 600; text-shadow: 0 0 5px rgba(6, 214, 160, 0.4); }
        .wrong-ans { color: var(--danger-color); font-weight: 600; text-shadow: 0 0 5px rgba(239, 71, 111, 0.4); }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mp3">
    </audio>

    <div class="top-controls">
        <button class="control-btn" id="lang-btn" onclick="toggleLang()">🌍 العربية</button>
        <button class="control-btn" id="audio-btn" onclick="toggleMusic()">🎵 Musique : OFF</button>
    </div>

    <div class="quiz-container">
        
        <!-- MENU PRINCIPAL -->
        <div id="menu-screen" class="screen active">
            <h1 id="menu-title">🏆 Super Quiz Interactif 🏆</h1>
            <p id="menu-desc" style="color: #adb5bd;">Choisissez votre catégorie préférée (10 questions) :</p>
            <div id="categories-menu" style="margin-top: 25px;"></div>
        </div>

        <!-- ZONE DE QUIZ -->
        <div id="quiz-screen" class="screen">
            <h2 id="quiz-title" style="color: var(--primary-color);">Domaine</h2>
            <div class="progress" id="progress-text">Question 1 sur 10</div>
            <h3 id="question-text">La question s'affichera ici</h3>
            
            <!-- Les choix de réponses -->
            <div id="options-menu" style="display: flex; flex-direction: column; align-items: center; margin-top: 20px;"></div>
            
            <!-- La correction immédiate (Cachée par défaut) -->
            <div id="immediate-feedback" style="display: none;">
                <p id="feedback-message" style="font-size: 22px; font-weight: bold; margin-top: 0;"></p>
                <p id="feedback-detail" style="font-size: 16px; margin-bottom: 20px;"></p>
                
                <div class="action-buttons">
                    <button class="btn btn-danger" id="quit-btn" onclick="retourAuMenu()">🏠 Quitter</button>
                    <button class="btn" id="continue-btn" onclick="passerQuestionSuivante()">➡️ Continuer</button>
                </div>
            </div>
        </div>

        <!-- RÉSULTAT ET CORRECTION FINALE -->
        <div id="result-screen" class="screen">
            <h1 id="result-title">Fin du Quiz !</h1>
            <div class="score-text" id="final-score">Score : 0 / 10</div>
            <p id="feedback-text" style="font-weight: 600;"></p>
            <div id="corrections-zone" class="corrections-container"></div>
            <button class="btn" id="replay-btn" onclick="retourAuMenu()">🔄 Rejouer au Menu</button>
        </div>

    </div>

        const progressText = document.getElementById('progress-text');
        const questionText = document.getElementById('question-text');
        const optionsMenu = document.getElementById('options-menu');
        const immediateFeedback = document.getElementById('immediate-feedback');
        const feedbackMessage = document.getElementById('feedback-message');
        const feedbackDetail = document.getElementById('feedback-detail');
        const finalScore = document.getElementById('final-score');
        const feedbackText = document.getElementById('feedback-text');
        const correctionsZone = document.getElementById('corrections-zone');
        
        const langBtn = document.getElementById('lang-btn');
        const bgMusic = document.getElementById('bg-music');
        const audioBtn = document.getElementById('audio-btn');
        const continueBtn = document.getElementById('continue-btn');
        const quitBtn = document.getElementById('quit-btn');

        function toggleMusic() {
            const loc = locales[currentLang];
            if (bgMusic.paused) {
                bgMusic.play().catch(() => {});
                audioBtn.innerText = loc.audioOn;
                audioBtn.style.backgroundColor = "var(--primary-color)";
                audioBtn.style.color = "white";
            } else {
                bgMusic.pause();
                audioBtn.innerText = loc.audioOff;
                audioBtn.style.backgroundColor = "var(--panel-bg)";
                audioBtn.style.color = "var(--primary-color)";
            }
        }

        function toggleLang() {
            currentLang = currentLang === 'fr' ? 'ar' : 'fr';
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';

            mettreAJourTextesUI();
            
            if(quizScreen.classList.contains('active') || resultScreen.classList.contains('active')) {
                retourAuMenu();
            } else {
                genererMenu();
            }
        }

        function mettreAJourTextesUI() {
            const loc = locales[currentLang];
            
            langBtn.innerText = loc.langBtn;
            audioBtn.innerText = bgMusic.paused ? loc.audioOff : loc.audioOn;
            
            document.getElementById('menu-title').innerText = loc.menuTitle;
            document.getElementById('menu-desc').innerText = loc.menuDesc;
            document.getElementById('result-title').innerText = loc.resultTitle;
            document.getElementById('replay-btn').innerText = loc.replayBtn;
            continueBtn.innerText = loc.continueBtn;
            quitBtn.innerText = loc.quitBtn;
        }

        function genererMenu() {
            categoriesMenu.innerHTML = "";
            const categoriesObj = locales[currentLang].categories;
            
            Object.keys(categoriesObj).forEach((categorie, index) => {
                const bouton = document.createElement('button');
                bouton.className = 'btn';
                bouton.innerText = categorie;
                bouton.onclick = () => lancerQuiz(index);
                categoriesMenu.appendChild(bouton);
            });
        }

        function lancerQuiz(categoryIndex) {
            if (bgMusic.paused && audioBtn.style.backgroundColor !== "var(--primary-color)") { toggleMusic(); }

            currentThemeKey = Object.keys(locales[currentLang].categories)[categoryIndex];
            indexQuestionActuelle = 0;
            score = 0;
            reponsesUtilisateur = [];

            quizTitle.innerText = currentThemeKey;
            menuScreen.classList.remove('active');
            quizScreen.classList.add('active');
            afficherQuestion();
        }

        function afficherQuestion() {
            const loc = locales[currentLang];
            const listeQuestions = loc.categories[currentThemeKey];
            const q = listeQuestions[indexQuestionActuelle];

            progressText.innerText = loc.progressText(indexQuestionActuelle + 1, listeQuestions.length);
            questionText.innerText = q.question;
            
            optionsMenu.style.display = "flex";
            immediateFeedback.style.display = "none";
            optionsMenu.innerHTML = "";

            q.options.forEach((option, index) => {
                const boutonOption = document.createElement('button');
                boutonOption.className = 'btn option-btn';
                boutonOption.innerText = option;
                boutonOption.onclick = () => enregistrerReponse(index);
                optionsMenu.appendChild(boutonOption);
            });
        }

        function enregistrerReponse(indexChoisi) {
            reponsesUtilisateur.push(indexChoisi);
            
            const loc = locales[currentLang];
            const listeQuestions = loc.categories[currentThemeKey];
            const q = listeQuestions[indexQuestionActuelle];
            const estCorrect = (indexChoisi === q.reponse);

            optionsMenu.style.display = "none";
            immediateFeedback.style.display = "block";

            if (estCorrect) {
                feedbackMessage.innerHTML = `<span class="correct-ans">${loc.correctMsg}</span>`;
                feedbackDetail.innerHTML = "";
                score++;
            } else {
                feedbackMessage.innerHTML = `<span class="wrong-ans">${loc.wrongMsg}</span>`;
                feedbackDetail.innerHTML = `${loc.correctAns} <strong class="correct-ans">${q.options[q.reponse]}</strong>`;
            }
        }

        function passerQuestionSuivante() {
            const listeQuestions = locales[currentLang].categories[currentThemeKey];
            indexQuestionActuelle++;
            
            if (indexQuestionActuelle < listeQuestions.length) {
                afficherQuestion();
            } else {
                afficherResultats();
            }
        }

        function afficherResultats() {
            const loc = locales[currentLang];
            const listeQuestions = loc.categories[currentThemeKey];
            const total = listeQuestions.length;
            correctionsZone.innerHTML = ""; 

            listeQuestions.forEach((q, index) => {
                const reponseDonnee = reponsesUtilisateur[index];
                const estCorrect = (reponseDonnee === q.reponse);
                const bordureCouleur = estCorrect ? "var(--success-color)" : "var(--danger-color)";
                const icone = estCorrect ? "✅" : "❌";

                let htmlCorrection = `
                    <div class="correction-item" style="border-inline-start-color: ${bordureCouleur};">
                        <p class="question-title">${index + 1}. ${q.question}</p>
                        <p>${loc.yourAns} <span class="${estCorrect ? 'correct-ans' : 'wrong-ans'}">${q.options[reponseDonnee]}</span> ${icone}</p>
                `;
                if (!estCorrect) {
                    htmlCorrection += `<p style="margin-top:4px;">${loc.correctAns} <strong class="correct-ans">${q.options[q.reponse]}</strong></p>`;
                }
                htmlCorrection += `</div>`;
                correctionsZone.innerHTML += htmlCorrection;
            });

            quizScreen.classList.remove('active');
            resultScreen.classList.add('active');
            finalScore.innerText = loc.scoreText(score, total);

            if (score === total) {
                feedbackText.innerText = loc.feedbackPerfect;
            } else if (score >= total / 2) {
                feedbackText.innerText = loc.feedbackGood;
            } else {
                feedbackText.innerText = loc.feedbackBad;
            }
        }

        function retourAuMenu() {
            resultScreen.classList.remove('active');
            quizScreen.classList.remove('active');
            menuScreen.classList.add('active');
            genererMenu();
        }

        mettreAJourTextesUI();
        genererMenu();
    </script>
</body>
</html>
