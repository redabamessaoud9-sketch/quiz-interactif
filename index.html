<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de Quiz Interactif</title>
    <style>
        /* THÈME COULEURS CLAIRES : Lumineux et Moderne */
        :root {
            --primary-color: #4a90e2;   /* Bleu vif moderne */
            --accent-color: #34495e;    /* Gris foncé pour les textes importants */
            --success-color: #2ecc71;   /* Vert pour les bonnes réponses */
            --danger-color: #e74c3c;    /* Rouge pour les mauvaises réponses */
            --bg-light: #f5f7fa;        /* Fond de page très clair */
            --panel-bg: #ffffff;        /* Fond des blocs (Blanc pur) */
            --text-dark: #2c3e50;       /* Couleur du texte principal */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
            position: relative;
        }

        /* Bouton de contrôle de la musique */
        .audio-control {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: var(--panel-bg);
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 10px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .audio-control:hover {
            background-color: var(--primary-color);
            color: white;
        }

        .quiz-container {
            background-color: var(--panel-bg);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            padding: 35px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            border-top: 6px solid var(--primary-color);
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 25px;
            font-size: 28px;
        }

        h2, h3 {
            color: var(--text-dark);
        }

        .screen { display: none; }
        .active { display: block; }

        /* Boutons principaux */
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 10px;
            width: 85%;
            box-shadow: 0 4px 10px rgba(74, 144, 226, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(74, 144, 226, 0.3);
            filter: brightness(1.05);
        }

        /* Boutons d'options du Quiz */
        .option-btn {
            background-color: #f8fafc;
            color: var(--text-dark);
            border: 2px solid #e2e8f0;
            box-shadow: none;
        }

        .option-btn:hover {
            background-color: #e3f2fd;
            border-color: var(--primary-color);
            color: var(--primary-color);
            transform: none;
            box-shadow: none;
        }

        .progress {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .score-text {
            font-size: 32px;
            font-weight: bold;
            margin: 15px 0;
            color: var(--primary-color);
        }

        /* Container de la correction de fin */
        .corrections-container {
            max-height: 350px;
            overflow-y: auto;
            margin: 25px 0;
            padding-right: 10px;
            text-align: left;
        }

        .corrections-container::-webkit-scrollbar { width: 6px; }
        .corrections-container::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .corrections-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        .correction-item {
            background: #f8fafc;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        .correction-item p { margin: 6px 0; }
        .question-title { font-weight: bold; color: var(--accent-color); }
        .correct-ans { color: var(--success-color); font-weight: 600; }
        .wrong-ans { color: var(--danger-color); font-weight: 600; }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mp3">
    </audio>

    <button class="audio-control" id="audio-btn" onclick="toggleMusic()">🎵 Musique : OFF</button>

    <div class="quiz-container">
        
        <div id="menu-screen" class="screen active">
            <h1>🏆 Super Quiz Interactif 🏆</h1>
            <p style="color: #7f8c8d;">Choisissez votre catégorie préférée (10 questions) :</p>
            <div id="categories-menu" style="margin-top: 25px;"></div>
        </div>

        <div id="quiz-screen" class="screen">
            <h2 id="quiz-title" style="color: var(--primary-color);">Domaine</h2>
            <div class="progress" id="progress-text">Question 1 sur 10</div>
            <h3 id="question-text">La question s'affichera ici</h3>
            <div id="options-menu" style="display: flex; flex-direction: column; align-items: center; margin-top: 20px;"></div>
        </div>

        <div id="result-screen" class="screen">
            <h1>Fin du Quiz !</h1>
            <div class="score-text" id="final-score">Score : 0 / 10</div>
            <p id="feedback-text" style="font-weight: 600;"></p>
            
            <div id="corrections-zone" class="corrections-container"></div>

            <button class="btn" onclick="retourAuMenu()">🔄 Rejouer</button>
        </div>

    </div>

    <script>
        const quizData = {
            "Joueurs de Football ⚽": [
                { question: "Quel joueur a remporté le plus de Ballons d'Or dans l'histoire ?", options: ["Cristiano Ronaldo", "Lionel Messi", "Zinédine Zidane", "Pelé"], reponse: 1 },
                { question: "Dans quel club espagnol Kylian Mbappé a-t-il été transféré en 2024 ?", options: ["FC Barcelone", "Atlético de Madrid", "Real Madrid", "Séville FC"], reponse: 2 },
                { question: "Quel pays a remporté la Coupe du Monde de la FIFA en 2022 ?", options: ["France", "Brésil", "Argentine", "Maroc"], reponse: 2 },
                { question: "Quel est le surnom de la légende brésilienne Pelé ?", options: ["Le Roi", "El Fenomeno", "La Pulga", "L'Extraterrestre"], reponse: 0 },
                { question: "Quelle nation détient le record de victoires en Coupe du Monde (5 fois) ?", options: ["Italie", "Brésil", "Allemagne", "Argentine"], reponse: 1 },
                { question: "Comment s'appelle le stade mythique du FC Barcelone ?", options: ["Santiago Bernabéu", "San Siro", "Anfield", "Camp Nou"], reponse: 3 },
                { question: "Qui est le meilleur buteur de l'histoire de la Ligue des Champions ?", options: ["Cristiano Ronaldo", "Robert Lewandowski", "Lionel Messi", "Karim Benzema"], reponse: 0 },
                { question: "Quelle est la nationalité de l'attaquant Erling Haaland ?", options: ["Suédoise", "Norvégienne", "Danoise", "Islandaise"], reponse: 1 },
                { question: "Combien de temps dure un match de football professionnel (sans prolongations) ?", options: ["80 minutes", "100 minutes", "90 minutes", "120 minutes"], reponse: 2 },
                { question: "Quel joueur français a remporté le Ballon d'Or en 2022 ?", options: ["Karim Benzema", "Antoine Griezmann", "Kylian Mbappé", "N'Golo Kanté"], reponse: 0 }
            ],
            "Dessins Animés 🎬": [
                { question: "Dans Bob l'Éponge, quel animal est son animal de compagnie, Gary ?", options: ["Un chat", "Un escargot", "Une méduse", "Un crabe"], reponse: 1 },
                { question: "Quel est le nom de la souris la plus rapide du Mexique dans les Looney Tunes ?", options: ["Speedy Gonzales", "Mickey Mouse", "Jerry", "Minus"], reponse: 0 },
                { question: "Quel est le premier Pokémon que Sacha obtient dans la série animée ?", options: ["Salamèche", "Pikachu", "Carapuce", "Bulbizarre"], reponse: 1 },
                { question: "Comment s'appelle le jeune lionceau héros du film Le Roi Lion ?", options: ["Mufasa", "Scar", "Simba", "Timon"], reponse: 2 },
                { question: "De quelle couleur est la peau des Schtroumpfs ?", options: ["Verte", "Rouge", "Bleue", "Jaune"], reponse: 2 },
                { question: "Quel est le nom de la famille jaune qui vit à Springfield ?", options: ["Les Simpson", "Les Griffin", "Les Flintstones", "Les Jetson"], reponse: 0 },
                { question: "Qui est l'ennemi juré, maquillé en clown, de Batman ?", options: ["Le Pingouin", "Double-Face", "L'Homme-Mystère", "Le Joker"], reponse: 3 },
                { question: "Quel est le nom du fidèle compagnon de Shrek ?", options: ["Le Chat potté", "L'Âne", "Le Dragon", "Pinocchio"], reponse: 1 },
                { question: "Quel est le nom du chien blanc qui accompagne toujours Tintin ?", options: ["Idéfix", "Milou", "Pluto", "Snoopy"], reponse: 1 },
                { question: "Dans l'anime Naruto, quel est le rêve du personnage principal ?", options: ["Devenir Hokage", "Trouver le One Piece", "Détruire le monde", "Devenir un Dieu de la Mort"], reponse: 0 }
            ],
            "Pixel Art & Jeux Rétro 👾": [
                { question: "Quel format d'image est le plus recommandé pour enregistrer du Pixel Art sans perte de qualité ?", options: ["PNG", "JPEG", "MP4", "PDF"], reponse: 0 },
                { question: "Quel jeu culte de 1980 demande de manger des pac-gommes dans un labyrinthe ?", options: ["Tetris", "Pac-Man", "Donkey Kong", "Space Invaders"], reponse: 1 },
                { question: "Dans le jeu Tetris, de combien de petits blocs carrés est composée chaque pièce ?", options: ["3", "5", "4", "6"], reponse: 2 },
                { question: "Quel logiciel basique de Microsoft a été utilisé par des millions de personnes pour dessiner pixel par pixel ?", options: ["Photoshop", "MS Paint", "Illustrator", "Blender"], reponse: 1 },
                { question: "Quelle est la couleur principale de la casquette et de la salopette de Mario ?", options: ["Vert", "Jaune", "Rouge", "Bleu"], reponse: 2 },
                { question: "Quel jeu vidéo populaire est entièrement construit avec des blocs pixelisés (voxels) ?", options: ["Fortnite", "Zelda", "Roblox", "Minecraft"], reponse: 3 },
                { question: "Comment s'appelle le petit dinosaure vert de l'ère 16-bits de Nintendo ?", options: ["Bowser", "Toad", "Yoshi", "Rex"], reponse: 2 },
                { question: "Sur quelle console est sorti le tout premier jeu Sonic the Hedgehog en 1991 ?", options: ["Super Nintendo", "Mega Drive", "PlayStation", "Game Boy"], reponse: 1 },
                { question: "Quelle célèbre franchise de jeu d'arcade met en scène des extraterrestres pixelisés descendant du ciel ?", options: ["Space Invaders", "Asteroids", "Galaga", "Centipede"], reponse: 0 },
                { question: "Comment s'appelle l'héroïne en armure du jeu rétro Metroid (1986) ?", options: ["Zelda", "Lara Croft", "Peach", "Samus Aran"], reponse: 3 }
            ]
        };

        let categorieActuelle = "";
        let indexQuestionActuelle = 0;
        let score = 0;
        let reponsesUtilisateur = [];

        const menuScreen = document.getElementById('menu-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const categoriesMenu = document.getElementById('categories-menu');
        const quizTitle = document.getElementById('quiz-title');
        const progressText = document.getElementById('progress-text');
        const questionText = document.getElementById('question-text');
        const optionsMenu = document.getElementById('options-menu');
        const finalScore = document.getElementById('final-score');
        const feedbackText = document.getElementById('feedback-text');
        const correctionsZone = document.getElementById('corrections-zone');
        
        const bgMusic = document.getElementById('bg-music');
        const audioBtn = document.getElementById('audio-btn');

        function toggleMusic() {
            if (bgMusic.paused) {
                bgMusic.play().catch(() => console.log("Lecture audio bloquée initialement."));
                audioBtn.innerText = "🔊 Musique : ON";
                audioBtn.style.backgroundColor = "var(--primary-color)";
                audioBtn.style.color = "white";
            } else {
                bgMusic.pause();
                audioBtn.innerText = "🎵 Musique : OFF";
                audioBtn.style.backgroundColor = "var(--panel-bg)";
                audioBtn.style.color = "var(--primary-color)";
            }
        }

        function genererMenu() {
            categoriesMenu.innerHTML = "";
            Object.keys(quizData).forEach(categorie => {
                const bouton = document.createElement('button');
                bouton.className = 'btn';
                bouton.innerText = categorie;
                bouton.onclick = () => lancerQuiz(categorie);
                categoriesMenu.appendChild(bouton);
            });
        }

        function lancerQuiz(categorie) {
            // Active la musique automatiquement lors du clic si le joueur ne l'a pas éteinte
            if (bgMusic.paused && audioBtn.innerText.includes("OFF")) { toggleMusic(); }

            categorieActuelle = categorie;
            indexQuestionActuelle = 0;
            score = 0;
            reponsesUtilisateur = [];

            quizTitle.innerText = categorieActuelle;
            menuScreen.classList.remove('active');
            quizScreen.classList.add('active');
            afficherQuestion();
        }

        function afficherQuestion() {
            const listeQuestions = quizData[categorieActuelle];
            const q = listeQuestions[indexQuestionActuelle];

            progressText.innerText = `Question ${indexQuestionActuelle + 1} sur ${listeQuestions.length}`;
            questionText.innerText = q.question;
            optionsMenu.innerHTML = "";

            q.options.forEach((option, index) => {
                const boutonOption = document.createElement('button');
                boutonOption.className = 'btn option-btn';
                boutonOption.innerText = option;
                boutonOption.onclick = () => enregistrerReponse(index);
                optionsMenu.appendChild(boutonOption);
            });
        }

        function enregistrerReponse(indexChoisi) {
            reponsesUtilisateur.push(indexChoisi);
            indexQuestionActuelle++;
            
            if (indexQuestionActuelle < quizData[categorieActuelle].length) {
                afficherQuestion();
            } else {
                afficherResultats();
            }
        }

        function afficherResultats() {
            const listeQuestions = quizData[categorieActuelle];
            const total = listeQuestions.length;
            score = 0;
            correctionsZone.innerHTML = ""; 

            listeQuestions.forEach((q, index) => {
                const reponseDonnee = reponsesUtilisateur[index];
                const estCorrect = (reponseDonnee === q.reponse);
                
                if (estCorrect) score++;

                const bordureCouleur = estCorrect ? "var(--success-color)" : "var(--danger-color)";
                const icone = estCorrect ? "✅" : "❌";

                let htmlCorrection = `
                    <div class="correction-item" style="border-left: 5px solid ${bordureCouleur};">
                        <p class="question-title">${index + 1}. ${q.question}</p>
                        <p>Ta réponse : <span class="${estCorrect ? 'correct-ans' : 'wrong-ans'}">${q.options[reponseDonnee]}</span> ${icone}</p>
                `;

                if (!estCorrect) {
                    htmlCorrection += `<p style="margin-top:4px;">👉 Bonne réponse : <strong class="correct-ans">${q.options[q.reponse]}</strong></p>`;
                }

                htmlCorrection += `</div>`;
                correctionsZone.innerHTML += htmlCorrection;
            });

            quizScreen.classList.remove('active');
            resultScreen.classList.add('active');
            finalScore.innerText = `Score : ${score} / ${total}`;

            if (score === total) {
                feedbackText.innerText = "🏆 Un sans-faute parfait ! Tu es un génie !";
            } else if (score >= total / 2) {
                feedbackText.innerText = "👍 Très bon score ! Regarde la correction en dessous.";
            } else {
                feedbackText.innerText = "🙃 Tu feras mieux au prochain essai ! Lis la correction.";
            }
        }

        function retourAuMenu() {
            resultScreen.classList.remove('active');
            menuScreen.classList.add('active');
        }

        genererMenu();
    </script>
</body>
</html>
