<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de Quiz Interactif</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --dark-color: #2c3e50;
            --light-color: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
            position: relative;
        }

        /* Bouton de contrôle de la musique */
        .audio-control {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .audio-control:hover {
            background-color: white;
            color: var(--dark-color);
        }

        .quiz-container {
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            padding: 30px;
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: var(--dark-color);
            margin-bottom: 25px;
        }

        .screen {
            display: none;
        }

        .active {
            display: block;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 10px;
            width: 80%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            filter: brightness(1.1);
        }

        .options-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .option-btn {
            background-color: var(--light-color);
            color: var(--dark-color);
            border: 2px solid #e0e0e0;
        }

        .option-btn:hover {
            background-color: #edf2f7;
            border-color: var(--primary-color);
            transform: none;
        }

        .progress {
            font-size: 14px;
            color: #777;
            margin-bottom: 15px;
        }

        .score-text {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://actions.google.com/sounds/v1/science_fiction/ambient_space_machine.ogg" type="audio/ogg">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
        Votre navigateur ne supporte pas l'élément audio.
    </audio>

    <button class="audio-control" id="audio-btn" onclick="toggleMusic()">🎵 Musique : OFF</button>

    <div class="quiz-container">
        
        <div id="menu-screen" class="screen active">
            <h1>🏆 Super Quiz Interactif 🏆</h1>
            <p>Choisissez votre domaine préféré pour commencer le défi :</p>
            <div id="categories-menu"></div>
        </div>

        <div id="quiz-screen" class="screen">
            <h2 id="quiz-title">Domaine</h2>
            <div class="progress" id="progress-text">Question 1 sur X</div>
            <h3 id="question-text">La question s'affichera ici</h3>
            <div class="options-container" id="options-menu"></div>
        </div>

        <div id="result-screen" class="screen">
            <h1>Fin de la partie !</h1>
            <div class="score-text" id="final-score">Votre score : 0 / 0</div>
            <p id="feedback-text">Message d'encouragement</p>
            <button class="btn" onclick="retourAuMenu()">🔄 Rejouer une partie</button>
        </div>

    </div>

    <script>
        const quizData = {
            "Joueurs de Football ⚽": [
                {
                    question: "Quel joueur a remporté le plus de Ballons d'Or dans l'histoire ?",
                    options: ["Cristiano Ronaldo", "Lionel Messi", "Zinédine Zidane", "Pelé"],
                    reponse: 1
                },
                {
                    question: "Dans quel club espagnol Kylian Mbappé a-t-il été transféré ?",
                    options: ["FC Barcelone", "Atlético de Madrid", "Real Madrid", "Séville FC"],
                    reponse: 2
                },
                {
                    question: "Quel pays a remporté la Coupe du Monde de la FIFA en 2022 ?",
                    options: ["France", "Brésil", "Argentine", "Maroc"],
                    reponse: 2
                }
            ],
            "Dessins Animés 🎬": [
                {
                    question: "Dans Bob l'Éponge, quel animal est son animal de compagnie, Gary ?",
                    options: ["Un chat", "Un escargot", "Un méduse", "Un crabe"],
                    reponse: 1
                },
                {
                    question: "Quel est le nom de la souris rapide dans Looney Tunes ?",
                    options: ["Speedy Gonzales", "Mickey", "Jerry", "Bugs Bunny"],
                    reponse: 0
                },
                {
                    question: "Qui est le pokémon de départ de Sacha dans la série animée ?",
                    options: ["Salamèche", "Pikachu", "Carapuce", "Bulbizarre"],
                    reponse: 1
                }
            ]
        };

        let categorieActuelle = "";
        let indexQuestionActuelle = 0;
        let score = 0;

        // Éléments HTML
        const menuScreen = document.getElementById('menu-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const categoriesMenu = document.getElementById('categories-menu');
        const quizTitle = document.getElementById('quiz-title');
        const progressText = document.getElementById('progress-text');
        const questionText = document.getElementById('question-text');
        const optionsMenu = document.getElementById('options-menu');
        const finalScore = document.getElementById('final-score');
        const feedbackText = document.getElementById('feedback-text');
        
        // Gestion de la musique
        const bgMusic = document.getElementById('bg-music');
        const audioBtn = document.getElementById('audio-btn');

        // Fonction pour activer/désactiver la musique
        function toggleMusic() {
            if (bgMusic.paused) {
                bgMusic.play().catch(error => console.log("Lecture automatique bloquée par le navigateur. Cliquez à nouveau."));
                audioBtn.innerText = "🔊 Musique : ON";
            } else {
                bgMusic.pause();
                audioBtn.innerText = "🎵 Musique : OFF";
            }
        }

        function genererMenu() {
            categoriesMenu.innerHTML = "";
            Object.keys(quizData).forEach(categorie => {
                const bouton = document.createElement('button');
                bouton.className = 'btn';
                bouton.innerText = categorie;
                bouton.onclick = () => lancerQuiz(categorie);
                categoriesMenu.appendChild(bouton);
            });
        }

        function lancerQuiz(categorie) {
            // Lancer la musique automatiquement dès que le joueur clique sur une catégorie 
            // (les navigateurs modernes forcent une action utilisateur avant de jouer du son)
            if (bgMusic.paused && audioBtn.innerText.includes("OFF")) {
                toggleMusic();
            }

            categorieActuelle = categorie;
            indexQuestionActuelle = 0;
            score = 0;
            quizTitle.innerText = categorieActuelle;
            
            menuScreen.classList.remove('active');
            quizScreen.classList.add('active');
            afficherQuestion();
        }

        function afficherQuestion() {
            const listeQuestions = quizData[categorieActuelle];
            const q = listeQuestions[indexQuestionActuelle];

            progressText.innerText = `Question ${indexQuestionActuelle + 1} sur ${listeQuestions.length}`;
            questionText.innerText = q.question;
            optionsMenu.innerHTML = "";

            q.options.forEach((option, index) => {
                const boutonOption = document.createElement('button');
                boutonOption.className = 'btn option-btn';
                boutonOption.innerText = option;
                boutonOption.onclick = () => verifierReponse(index);
                optionsMenu.appendChild(boutonOption);
            });
        }

        function verifierReponse(indexChoisi) {
            const listeQuestions = quizData[categorieActuelle];
            const bonneReponse = listeQuestions[indexQuestionActuelle].reponse;

            if (indexChoisi === bonneReponse) {
                score++;
                alert("🎉 Bonne réponse !");
            } else {
                alert(`❌ Faux ! La bonne réponse était : ${listeQuestions[indexQuestionActuelle].options[bonneReponse]}`);
            }

            indexQuestionActuelle++;
            if (indexQuestionActuelle < listeQuestions.length) {
                afficherQuestion();
            } else {
                afficherResultats();
            }
        }

        function afficherResultats() {
            const total = quizData[categorieActuelle].length;
            quizScreen.classList.remove('active');
            resultScreen.classList.add('active');
            finalScore.innerText = `Votre score : ${score} / ${total}`;

            if (score === total) {
                feedbackText.innerText = "🏆 Incroyable ! Un sans-faute parfait !";
            } else if (score >= total / 2) {
                feedbackText.innerText = "👍 Bien joué ! Tu te débrouilles super bien.";
            } else {
                feedbackText.innerText = "🙃 Dommage... Entraîne-toi encore et réessaye !";
            }
        }

        function retourAuMenu() {
            resultScreen.classList.remove('active');
            menuScreen.classList.add('active');
        }

        genererMenu();
    </script>
</body>
</html>
